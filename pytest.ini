[pytest]
filterwarnings =
    ignore:.*_UnionGenericAlias.*:DeprecationWarning
    ignore:.*:DeprecationWarning:google\.genai.*
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*
    ignore:.*Using `httpx` with `starlette\.testclient` is deprecated.*
    ignore:.*renamed.*:RuntimeWarning
    ignore:.*duckduckgo.*:RuntimeWarning
    ignore:This package.*ddgs.*:RuntimeWarning
    ignore:.*renamed to.*:RuntimeWarning
    ignore::RuntimeWarning

